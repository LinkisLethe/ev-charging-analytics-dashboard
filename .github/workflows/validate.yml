name: Validate project

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: r-lib/actions/setup-r@v2
      - name: Validate source and data schemas
        run: Rscript scripts/validate_project.R
